<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cloud Drive</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

nav {background: rgba(255,255,255,0.1);}

.row {display:flex; flex-wrap:wrap; justify-content:center;}

.col {flex:1 1 220px; max-width:250px;}

.card {
    border-radius:15px;
    background: rgba(255,255,255,0.1);
    color:white;
    transition:0.3s;
}

.card:hover {transform:scale(1.05);}

@media (max-width:600px){
.col {flex:1 1 100%; max-width:100%;}
}

.fab {
position:fixed;
bottom:20px;
right:20px;
}
</style>
</head>

<body>

<nav>
<div class="nav-wrapper">
<a href="/" class="brand-logo">☁️ CloudDrive</a>
</div>
</nav>

<div class="container">
<h4 class="center white-text">My Files</h4>

<div class="row">

{% for file,size in files %}
<div class="col">
<div class="card center">

<div class="card-content">
<i class="material-icons large">insert_drive_file</i>
<p>{{file}}</p>
<small>{{size}} KB</small>
</div>

<div class="card-action">
<a href="/download/{{file}}">
<i class="material-icons">download</i>
</a>

<a href="/delete/{{file}}" onclick="return confirm('Delete?')">
<i class="material-icons red-text">delete</i>
</a>
</div>

</div>
</div>
{% endfor %}

</div>
</div>

<div class="fab">
<a href="/" class="btn-floating btn-large blue pulse">
<i class="material-icons">add</i>
</a>
</div>

</body>
</html>
